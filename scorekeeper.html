<!DOCTYPE html>
<html>
<head>
  <title>Scorekeeper – Mini FTC Scoring</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: white;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    nav {
      background: #000;
      padding: 15px 0;
      border-bottom: 4px solid #EBF368;
      display: flex;
      justify-content: center;
      gap: 40px;
      font-size: 22px;
      font-weight: bold;
    }

    nav a {
      color: #EBF368;
      text-decoration: none;
      padding: 5px 10px;
      transition: 0.2s;
    }

    nav a:hover {
      color: black;
      background: #EBF368;
      border-radius: 6px;
      box-shadow: 0 0 12px #EBF368;
    }

    h1 {
      margin-top: 20px;
      font-size: 40px;
      color: #EBF368;
    }

    .container {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
      padding: 0 40px;
    }

    .panel {
      width: 45%;
      background: #111;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .panel h2 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .panel.red h2 { color: #FF5252; }
    .panel.blue h2 { color: #64B5F6; }

    button {
      width: 90%;
      padding: 15px;
      margin: 10px 0;
      font-size: 20px;
      font-weight: bold;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .red-btn { background: #D32F2F; color: white; }
    .blue-btn { background: #1976D2; color: white; }
    .toggle-btn { background: #444; color: white; }
    .reset-btn { background: #555; color: white; margin-top: 20px; }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="scorekeeper.html">Scorekeeper</a>
    <a href="audience.html">Audience</a>
    <a href="matches.html">Matches</a>
    <a href="rankings.html">Rankings</a>
  </nav>

  <h1>Scorekeeper Panel</h1>

  <div class="container">

    <!-- RED ALLIANCE -->
    <div class="panel red">
      <h2>Red Alliance</h2>

      <button class="red-btn" onclick="add('red_smallGemDelta')">+ Small Gem</button>
      <button class="red-btn" onclick="add('red_crystalGemDelta')">+ Big Gem</button>

      <button class="toggle-btn" onclick="toggle('red_pedestal1')">Toggle Pedestal 1</button>
      <button class="toggle-btn" onclick="toggle('red_pedestal2')">Toggle Pedestal 2</button>
      <button class="toggle-btn" onclick="toggle('red_pedestal3')">Toggle Pedestal 3</button>

      <button class="toggle-btn" onclick="toggle('red_chest1')">Toggle Chest 1</button>
      <button class="toggle-btn" onclick="toggle('red_chest2')">Toggle Chest 2</button>
    </div>

    <!-- BLUE ALLIANCE -->
    <div class="panel blue">
      <h2>Blue Alliance</h2>

      <button class="blue-btn" onclick="add('blue_smallGemDelta')">+ Small Gem</button>
      <button class="blue-btn" onclick="add('blue_crystalGemDelta')">+ Big Gem</button>

      <button class="toggle-btn" onclick="toggle('blue_pedestal1')">Toggle Pedestal 1</button>
      <button class="toggle-btn" onclick="toggle('blue_pedestal2')">Toggle Pedestal 2</button>
      <button class="toggle-btn" onclick="toggle('blue_pedestal3')">Toggle Pedestal 3</button>

      <button class="toggle-btn" onclick="toggle('blue_chest1')">Toggle Chest 1</button>
      <button class="toggle-btn" onclick="toggle('blue_chest2')">Toggle Chest 2</button>
    </div>

  </div>

  <button class="reset-btn" onclick="resetScoring()">Reset Scoring</button>

<script>
  /* ADD GEM */
  function add(key) {
    let val = parseInt(localStorage.getItem(key) || "0", 10);
    val++;
    localStorage.setItem(key, val);
  }

  /* TOGGLE PED / CHEST */
  function toggle(key) {
    const current = localStorage.getItem(key) === "true";
    localStorage.setItem(key, (!current).toString());
  }

  /* RESET ALL SCORING */
  function resetScoring() {
    const keys = [
      "red_smallGemDelta","red_crystalGemDelta",
      "blue_smallGemDelta","blue_crystalGemDelta",
      "red_pedestal1","red_pedestal2","red_pedestal3",
      "blue_pedestal1","blue_pedestal2","blue_pedestal3",
      "red_chest1","red_chest2",
      "blue_chest1","blue_chest2"
    ];

    keys.forEach(k => localStorage.removeItem(k));
  }
</script>

</body>
</html>
