<!DOCTYPE html>
<html>
<head>
  <title>Audience Display – Mini FTC Scoring</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: white;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    /* ELECTRIC STORM NAV BAR */
    nav {
      background: #000;
      padding: 15px 0;
      border-bottom: 4px solid #EBF368;
      display: flex;
      justify-content: center;
      gap: 40px;
      font-size: 22px;
      font-weight: bold;
    }

    nav a {
      color: #EBF368;
      text-decoration: none;
      position: relative;
      padding: 5px 10px;
      transition: 0.2s;
    }

    nav a:hover {
      color: black;
      background: #EBF368;
      border-radius: 6px;
      box-shadow: 0 0 12px #EBF368;
    }

    nav a:hover::after {
      content: "⚡";
      position: absolute;
      right: -18px;
      top: 0;
    }

    #matchLabel {
      font-size: 40px;
      margin-top: 20px;
      color: #ccc;
    }

    #timer {
      font-size: 160px;
      font-weight: bold;
      margin-top: 10px;
    }

    #phaseLabel {
      font-size: 48px;
      margin-top: -20px;
      margin-bottom: 20px;
      color: #EBF368;
      text-shadow: 0 0 12px #EBF368;
    }

    .score-container {
      display: flex;
      justify-content: space-around;
      margin-top: 40px;
      padding: 0 40px;
    }

    .alliance-box {
      width: 40%;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .red { background: #D32F2F; }
    .blue { background: #1976D2; }

    .score {
      font-size: 120px;
      font-weight: bold;
    }

    .team-names {
      font-size: 32px;
      margin-top: 10px;
    }

    .sub-label {
      font-size: 20px;
      opacity: 0.8;
      margin-bottom: 5px;
    }

    /* GEM + TREASURE UI */
    #gemPanel {
      margin-top: 50px;
      font-size: 32px;
      color: #EBF368;
    }

    #treasureBoxDisplay {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 40px;
    }
  </style>
</head>

<body>

  <!-- NAV BAR -->
  <nav>
    <a href="index.html">Home</a>
    <a href="scorekeeper.html">Scorekeeper</a>
    <a href="audience.html">Audience</a>
    <a href="matches.html">Matches</a>
    <a href="rankings.html">Rankings</a>
  </nav>

  <div id="matchLabel">Match ?</div>

  <div id="timer">3:00</div>
  <div id="phaseLabel">Waiting…</div>

  <div class="score-container">
    <div class="alliance-box red">
      <div class="sub-label">Red Alliance</div>
      <div class="score" id="redScore">0</div>
      <div class="team-names" id="redTeams">Red Teams</div>
    </div>

    <div class="alliance-box blue">
      <div class="sub-label">Blue Alliance</div>
      <div class="score" id="blueScore">0</div>
      <div class="team-names" id="blueTeams">Blue Teams</div>
    </div>
  </div>

  <!-- GEM COUNTS -->
  <div id="gemPanel">
    <div>Small Gems: <span id="smallGemCount">0</span></div>
    <div>Crystal Gems: <span id="crystalGemCount">0</span></div>
    <div>Push Gems: <span id="pushGemCount">0</span></div>
    <div>Move Crystals: <span id="moveCrystalCount">0</span></div>
    <div>Park in Gem Zone: <span id="parkGemZoneCount">0</span></div>
    <div>Deliver Crystals: <span id="deliverCrystalCount">0</span></div>
    <div>Color Orientation: <span id="colorOrientationCount">0</span></div>
    <div>Fill Pedestals: <span id="fillPedestalsCount">0</span></div>
    <div>Close Lid: <span id="closeLidCount">0</span></div>
  </div>

  <!-- TREASURE BOX ICONS -->
  <div id="treasureBoxDisplay">
    <svg id="chest1" width="120" height="120" viewBox="0 0 100 100"></svg>
    <svg id="chest2" width="120" height="120" viewBox="0 0 100 100"></svg>
  </div>

<script>
  /* DRAW TREASURE CHESTS */
  function drawChest(svgElement, filled) {
    svgElement.innerHTML = filled
      ? `
        <rect x="10" y="30" width="80" height="50" fill="#EBF368" stroke="#000" stroke-width="4"/>
        <rect x="10" y="20" width="80" height="20" fill="#C9C04A" stroke="#000" stroke-width="4"/>
        <circle cx="50" cy="55" r="6" fill="#000"/>
      `
      : `
        <rect x="10" y="30" width="80" height="50" fill="none" stroke="#EBF368" stroke-width="4"/>
        <rect x="10" y="20" width="80" height="20" fill="none" stroke="#EBF368" stroke-width="4"/>
        <circle cx="50" cy="55" r="6" fill="none" stroke="#EBF368" stroke-width="4"/>
      `;
  }

  /* TIMER PHASES */
  const AUTO_TIME = 30;
  const TRANSITION_TIME = 8;
  const TELEOP_TIME = 120;
  const ENDGAME_START = 30;

  let phase = "waiting";
  let timeLeft = AUTO_TIME;
  let timer = null;

  function startMatch() {
    if (timer) clearInterval(timer);
    phase = "auto";
    timeLeft = AUTO_TIME;
    timer = setInterval(tick, 1000);
    syncState();
    updateDisplay();
  }

  function stopMatch() {
    if (timer) clearInterval(timer);
    timer = null;
    syncState();
  }

  function resetMatch() {
    if (timer) clearInterval(timer);
    timer = null;
    phase = "waiting";
    timeLeft = AUTO_TIME;
    updateDisplay();
    syncState();
  }

  function tick() {
    timeLeft--;

    if (phase === "auto" && timeLeft <= 0) {
      phase = "transition";
      timeLeft = TRANSITION_TIME;
    }
    else if (phase === "transition" && timeLeft <= 0) {
      phase = "teleop";
      timeLeft = TELEOP_TIME;
    }
    else if (phase === "teleop" && timeLeft === ENDGAME_START) {
      phase = "endgame";
    }
    else if ((phase === "teleop" || phase === "endgame") && timeLeft <= 0) {
      phase = "ended";
      timeLeft = 0;
      clearInterval(timer);
      timer = null;
    }

    updateDisplay();
    syncState();
  }

  function updateDisplay() {
    // Timer
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    document.getElementById("timer").textContent =
      m + ":" + (s < 10 ? "0" + s : s);

    // Phase label
    let label = "Waiting…";
    if (phase === "auto") label = "Autonomous";
    if (phase === "transition") label = "Transition Period";
    if (phase === "teleop") label = "Tele-Op";
    if (phase === "endgame") label = "Endgame";
    if (phase === "ended") label = "Match Ended";
    document.getElementById("phaseLabel").textContent = label;

    // Scores
    document.getElementById("redScore").textContent =
      localStorage.getItem("scoreRed") || 0;
    document.getElementById("blueScore").textContent =
      localStorage.getItem("scoreBlue") || 0;

    // Match label
    const match = localStorage.getItem("currentMatch") || "?";
    document.getElementById("matchLabel").textContent = "Match " + match;

    // Team names
    const matches = JSON.parse(localStorage.getItem("matches") || "[]");
    const matchObj = matches.find(m => m.matchNumber == match);

    if (matchObj) {
      document.getElementById("redTeams").textContent =
        (matchObj.redTeams || []).join(" & ") || "Red Teams";
      document.getElementById("blueTeams").textContent =
        (matchObj.blueTeams || []).join(" & ") || "Blue Teams";
    }

    // GEM COUNTS
    const gemIds = [
      "smallGem", "crystalGem", "pushGem", "moveCrystal",
      "parkGemZone", "deliverCrystal", "colorOrientation",
      "fillPedestals", "closeLid"
    ];

    gemIds.forEach(id => {
      document.getElementById(id + "Count").textContent =
        localStorage.getItem(id + "Count") || 0;
    });

    // TREASURE BOXES
    const treasureCount = parseInt(localStorage.getItem("treasureBoxCount") || "0", 10);
    drawChest(document.getElementById("chest1"), treasureCount >= 1);
    drawChest(document.getElementById("chest2"), treasureCount >= 2);
  }

  function syncState() {
    localStorage.setItem("currentPeriod", phase);
    localStorage.setItem("matchTimer", timeLeft);
  }

  // Update display continuously
  setInterval(updateDisplay, 200);
  updateDisplay();
</script>

</body>
</html>
