<!DOCTYPE html>
<html>
<head>
  <title>Teams & Matches – Electric Storm Scoring</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #050816;
      color: #f5f5f5;
    }
    header {
      background: #0b1020;
      border-bottom: 2px solid #EBF368;
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand {
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #EBF368;
    }
    nav a {
      color: #e5e7eb;
      margin-left: 1rem;
      text-decoration: none;
    }
    nav a:hover {
      color: #EBF368;
    }
    main {
      padding: 2rem;
      max-width: 900px;
      margin: auto;
    }
    .card {
      background: #0b1020;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border: 1px solid #1f2937;
    }
    input, button {
      padding: 0.5rem;
      margin-top: 0.5rem;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #EBF368;
      color: #000;
      cursor: pointer;
      margin-top: 1rem;
    }
    button:hover {
      background: #1bb8d1;
    }
    .team-list {
      margin-top: 1rem;
    }
    .team-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .team-item img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">Electric Storm Scoring</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="scorekeeper.html">Scorekeeper</a>
      <a href="audience.html">Audience</a>
      <a href="rankings.html">Rankings</a>
      <a href="matches.html">Teams & Matches</a>
    </nav>
  </header>

  <main>
    <h1>Teams & Matches</h1>

    <!-- ADD TEAM -->
    <div class="card">
      <h2>Add a Team</h2>
      <input id="teamName" placeholder="Team Name">
      <input id="teamAvatar" type="file" accept="image/*">
      <button onclick="addTeam()">Add Team</button>
    </div>

    <!-- TEAM LIST -->
    <div class="card">
      <h2>Teams</h2>
      <div id="teamList" class="team-list"></div>
    </div>

    <!-- MATCH SCHEDULER -->
    <div class="card">
      <h2>Match Schedule</h2>

      <label>Matches per team:</label>
      <input id="matchesPerTeam" type="number" min="1" value="3">

      <button onclick="generateSchedule()">Generate Match Schedule</button>

      <div id="matchList" class="team-list"></div>
    </div>

    <!-- EVENT DATA -->
    <div class="card">
      <h2>Event Data</h2>
      <button onclick="exportTeams()">Export Teams</button>
      <input type="file" id="importFile" accept=".json" style="margin-top:1rem;">
      <button onclick="importTeams()">Import Teams</button>
    </div>

  </main>

  <script>
    // ============================
    // TEAM STORAGE + PASSCODE
    // ============================
    let teams = JSON.parse(localStorage.getItem("teams")) || [];
    let matches = JSON.parse(localStorage.getItem("matches")) || [];

    const PASSCODE = "13415";

    function requirePasscode() {
      const entered = prompt("Enter passcode to edit:");
      return entered === PASSCODE;
    }

    // ============================
    // TEAM RENDERING
    // ============================
    function renderTeams() {
      const list = document.getElementById("teamList");
      list.innerHTML = "";

      teams.forEach(team => {
        const div = document.createElement("div");
        div.className = "team-item";

        const avatar = team.avatar && team.avatar !== ""
          ? team.avatar
          : "images/default-avatar.png";

        div.innerHTML = `
          <img src="${avatar}">
          <strong>${team.name}</strong>
          <button onclick="editTeam(${team.id})">Edit</button>
          <button onclick="deleteTeam(${team.id})">Delete</button>
        `;

        list.appendChild(div);
      });
    }

    // ============================
    // TEAM ADD / EDIT / DELETE
    // ============================
    function addTeam() {
      const name = document.getElementById("teamName").value.trim();
      const file = document.getElementById("teamAvatar").files[0];

      if (!name) {
        alert("Please enter a team name.");
        return;
      }

      if (teams.some(t => t.name.toLowerCase() === name.toLowerCase())) {
        alert("A team with that name already exists.");
        return;
      }

      if (!file) {
        teams.push({
          id: Date.now(),
          name,
          avatar: "images/default-avatar.png"
        });
        localStorage.setItem("teams", JSON.stringify(teams));
        renderTeams();
        return;
      }

      const reader = new FileReader();
      reader.onload = e => {
        teams.push({
          id: Date.now(),
          name,
          avatar: e.target.result
        });
        localStorage.setItem("teams", JSON.stringify(teams));
        renderTeams();
      };
      reader.readAsDataURL(file);
    }

    function editTeam(id) {
      if (!requirePasscode()) {
        alert("Incorrect passcode.");
        return;
      }

      const team = teams.find(t => t.id === id);
      if (!team) return;

      const newName = prompt("Enter new team name:", team.name);
      if (!newName) return;

      if (teams.some(t => t.name.toLowerCase() === newName.toLowerCase() && t.id !== id)) {
        alert("A team with that name already exists.");
        return;
      }

      team.name = newName;

      if (confirm("Change avatar?")) {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = e => {
          const file = e.target.files[0];
          if (!file) {
            team.avatar = "images/default-avatar.png";
            localStorage.setItem("teams", JSON.stringify(teams));
            renderTeams();
            return;
          }
          const reader = new FileReader();
          reader.onload = ev => {
            team.avatar = ev.target.result;
            localStorage.setItem("teams", JSON.stringify(teams));
            renderTeams();
          };
          reader.readAsDataURL(file);
        };
        input.click();
      } else {
        localStorage.setItem("teams", JSON.stringify(teams));
        renderTeams();
      }
    }

    function deleteTeam(id) {
      if (!requirePasscode()) {
        alert("Incorrect passcode.");
        return;
      }
      if (!confirm("Delete this team?")) return;

      teams = teams.filter(t => t.id !== id);
      localStorage.setItem("teams", JSON.stringify(teams));
      renderTeams();
    }

    // ============================
    // TEAM IMPORT / EXPORT
    // ============================
    function exportTeams() {
      const data = JSON.stringify(teams, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "teams.json";
      a.click();

      URL.revokeObjectURL(url);
    }

    function importTeams() {
      const file = document.getElementById("importFile").files[0];
      if (!file) {
        alert("Choose a JSON file first.");
        return;
      }

      const reader = new FileReader();
      reader.onload = e => {
        try {
          const imported = JSON.parse(e.target.result);
          if (!Array.isArray(imported)) throw "Invalid format";

          teams = imported;
          localStorage.setItem("teams", JSON.stringify(teams));
          renderTeams();
          alert("Teams imported successfully.");
        } catch {
          alert("Invalid JSON file.");
        }
      };
      reader.readAsText(file);
    }

    // ============================
    // HELPER: COMBINATIONS OF 4
    // ============================
    function getCombosOf4(ids) {
      const combos = [];
      const n = ids.length;
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          for (let k = j + 1; k < n; k++) {
            for (let l = k + 1; l < n; l++) {
              combos.push([ids[i], ids[j], ids[k], ids[l]]);
            }
          }
        }
      }
      return combos;
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    // ============================
    // FTC-STYLE AUTO SCHEDULER
    // ============================
    function generateSchedule() {
      if (!requirePasscode()) {
        alert("Incorrect passcode.");
        return;
      }

      const matchesPerTeam = parseInt(document.getElementById("matchesPerTeam").value);
      if (isNaN(matchesPerTeam) || matchesPerTeam < 1) {
        alert("Enter a valid number of matches per team.");
        return;
      }

      if (teams.length < 4) {
        alert("You need at least 4 teams to generate a 2v2 schedule.");
        return;
      }

      matches = [];

      const partners = {};
      const opponents = {};
      const matchCount = {};

      teams.forEach(t => {
        partners[t.id] = new Set();
        opponents[t.id] = new Set();
        matchCount[t.id] = 0;
      });

      const MAX_TRIES_PER_MATCH = 200;
      const allTeamIds = teams.map(t => t.id);

      function allTargetsMet() {
        return allTeamIds.every(id => matchCount[id] >= matchesPerTeam);
      }

      while (!allTargetsMet()) {
        let chosenGroup = null;
        let forcedRepeat = false;

        // Try to find a fully valid group
        let tries = 0;
        while (tries < MAX_TRIES_PER_MATCH && !chosenGroup) {
          tries++;

          // Sort teams by fewest matches played, then randomize within same counts
          const sortedIds = [...allTeamIds].sort((a, b) => matchCount[a] - matchCount[b]);
          // To add some randomness, shuffle small windows
          shuffleArray(sortedIds);

          // Limit candidate pool to keep search reasonable
          const candidateIds = sortedIds; // could slice if needed

          let combos = getCombosOf4(candidateIds);
          shuffleArray(combos);

          for (const combo of combos) {
            const [a, b, c, d] = combo;

            // Don't exceed target too much: soft cap at matchesPerTeam+1
            if (matchCount[a] > matchesPerTeam + 1 ||
                matchCount[b] > matchesPerTeam + 1 ||
                matchCount[c] > matchesPerTeam + 1 ||
                matchCount[d] > matchesPerTeam + 1) {
              continue;
            }

            // Avoid repeated partners
            if (partners[a].has(b)) continue;
            if (partners[c].has(d)) continue;

            // Avoid repeated opponents
            if (opponents[a].has(c) || opponents[a].has(d)) continue;
            if (opponents[b].has(c) || opponents[b].has(d)) continue;

            // Avoid back-to-back matches (minimum 1 match rest)
            if (matches.length > 0) {
              const last = matches[matches.length - 1];
              const lastTeams = new Set([last.red1, last.red2, last.blue1, last.blue2]);
              if (lastTeams.has(a) || lastTeams.has(b) || lastTeams.has(c) || lastTeams.has(d)) {
                continue;
              }
            }

            chosenGroup = combo;
            break;
          }
        }

        // If no fully valid group found, allow a forced repeat (with break note)
        if (!chosenGroup) {
          forcedRepeat = true;

          let relaxedTries = 0;
          while (relaxedTries < MAX_TRIES_PER_MATCH && !chosenGroup) {
            relaxedTries++;

            const sortedIds = [...allTeamIds].sort((a, b) => matchCount[a] - matchCount[b]);
            shuffleArray(sortedIds);
            const candidateIds = sortedIds;

            let combos = getCombosOf4(candidateIds);
            shuffleArray(combos);

            for (const combo of combos) {
              const [a, b, c, d] = combo;

              // Still avoid back-to-back matches
              if (matches.length > 0) {
                const last = matches[matches.length - 1];
                const lastTeams = new Set([last.red1, last.red2, last.blue1, last.blue2]);
                if (lastTeams.has(a) || lastTeams.has(b) || lastTeams.has(c) || lastTeams.has(d)) {
                  continue;
                }
              }

              // Soft cap on match counts
              if (matchCount[a] > matchesPerTeam + 1 ||
                  matchCount[b] > matchesPerTeam + 1 ||
                  matchCount[c] > matchesPerTeam + 1 ||
                  matchCount[d] > matchesPerTeam + 1) {
                continue;
              }

              chosenGroup = combo;
              break;
            }
          }

          // If still nothing, break to avoid infinite loop
          if (!chosenGroup) {
            console.warn("Scheduler could not find any more valid groups; stopping early.");
            break;
          }
        }

        const [t1, t2, t3, t4] = chosenGroup;

        // Update tracking
        partners[t1].add(t2);
        partners[t2].add(t1);
        partners[t3].add(t4);
        partners[t4].add(t3);

        [t1, t2].forEach(r => {
          opponents[r].add(t3);
          opponents[r].add(t4);
        });
        [t3, t4].forEach(b => {
          opponents[b].add(t1);
          opponents[b].add(t2);
        });

        matchCount[t1]++;
        matchCount[t2]++;
        matchCount[t3]++;
        matchCount[t4]++;

        matches.push({
          matchNumber: matches.length + 1,
          red1: t1,
          red2: t2,
          blue1: t3,
          blue2: t4,
          surrogate: false,
          forcedRepeat: forcedRepeat
        });

        // Safety: if we somehow explode in match count, stop
        if (matches.length > teams.length * matchesPerTeam * 2) {
          console.warn("Scheduler exceeded expected match count; stopping.");
          break;
        }
      }

      localStorage.setItem("matches", JSON.stringify(matches));
      renderMatches();
    }

    // ============================
    // MATCH RENDERING
    // ============================
    function renderMatches() {
      const list = document.getElementById("matchList");
      list.innerHTML = "";

      matches.forEach(match => {
        const r1 = teams.find(t => t.id === match.red1)?.name || "TBD";
        const r2 = teams.find(t => t.id === match.red2)?.name || "TBD";
        const b1 = teams.find(t => t.id === match.blue1)?.name || "TBD";
        const b2 = teams.find(t => t.id === match.blue2)?.name || "TBD";

        const surrogateTag = match.surrogate
          ? `<span style="color:#EBF368; font-size:0.8rem;">(Surrogate Match)</span>`
          : "";

        const breakTag = match.forcedRepeat
          ? `<span style="color:#EBF368; font-size:0.8rem;">(5-minute break before this match)</span>`
          : "";

        const div = document.createElement("div");
        div.className = "team-item";
        div.innerHTML = `
          <strong>Match ${match.matchNumber}</strong> 
          ${surrogateTag} ${breakTag}<br>
          <span style="color:#ff4d4d">${r1} & ${r2}</span> vs 
          <span style="color:#4da6ff">${b1} & ${b2}</span>
          <button onclick="deleteMatch(${match.matchNumber})">Delete</button>
        `;

        list.appendChild(div);
      });
    }

    // ============================
    // DELETE MATCH
    // ============================
    function deleteMatch(num) {
      if (!requirePasscode()) {
        alert("Incorrect passcode.");
        return;
      }

      matches = matches.filter(m => m.matchNumber !== num);
      matches.forEach((m, i) => m.matchNumber = i + 1);

      localStorage.setItem("matches", JSON.stringify(matches));
      renderMatches();
    }

    // ============================
    // INITIAL LOAD
    // ============================
    renderTeams();
    renderMatches();
  </script>
</body>
</html>
