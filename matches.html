<!DOCTYPE html>
<html>
<head>
  <title>Teams & Matches – Electric Storm Scoring</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #050816;
      color: #f5f5f5;
    }
    header {
      background: #0b1020;
      border-bottom: 2px solid #EBF368;
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand {
        font-weight: 700;
        letter-spacing: 0.05em;
        color: #EBF368;
      }
    nav a {
      color: #e5e7eb;
      margin-left: 1rem;
      text-decoration: none;
    }
    nav a:hover {
      color: #EBF368;
    }
    main {
      padding: 2rem;
      max-width: 900px;
      margin: auto;
    }
    .card {
      background: #0b1020;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border: 1px solid #1f2937;
    }
    input, button {
      padding: 0.5rem;
      margin-top: 0.5rem;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #EBF368;
      color: #000;
      cursor: pointer;
      margin-top: 1rem;
    }
    button:hover {
      background: #1bb8d1;
    }
    .team-list {
      margin-top: 1rem;
    }
    .team-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .team-item img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">Electric Storm Scoring</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="scorekeeper.html">Scorekeeper</a>
      <a href="audience.html">Audience</a>
      <a href="rankings.html">Rankings</a>
      <a href="matches.html">Teams & Matches</a>
    </nav>
  </header>

  <main>
    <h1>Teams & Matches</h1>

    <div class="card">
      <h2>Add a Team</h2>
      <input id="teamName" placeholder="Team Name">
      <input id="teamAvatar" type="file" accept="image/*">
      <button onclick="addTeam()">Add Team</button>
    </div>

    <div class="card">
      <h2>Teams</h2>
      <div id="teamList" class="team-list"></div>
    </div>

    <div class="card">
      <h2>Event Data</h2>
      <button onclick="exportTeams()">Export Teams</button>
      <input type="file" id="importFile" accept=".json" style="margin-top:1rem;">
      <button onclick="importTeams()">Import Teams</button>
    </div>

  </main>

  <script>
    let teams = JSON.parse(localStorage.getItem("teams")) || [];

    function renderTeams() {
      const list = document.getElementById("teamList");
      list.innerHTML = "";

      teams.forEach(team => {
        const div = document.createElement("div");
        div.className = "team-item";
       div.innerHTML = `
        const avatar = team.avatar && team.avatar !== "" 
          ? team.avatar 
          : "images/default-avatar.png";
        <strong>${team.name}</strong>
        <button onclick="editTeam(${team.id})">Edit</button>
        <button onclick="deleteTeam(${team.id})">Delete</button>
      `;

        list.appendChild(div);
      });
    }

   function addTeam() {
  const name = document.getElementById("teamName").value.trim();
  const file = document.getElementById("teamAvatar").files[0];

  if (!name) {
    alert("Please enter a team name.");
    return;
  }

  // Duplicate check
  const exists = teams.some(team => team.name.toLowerCase() === name.toLowerCase());
  if (exists) {
    alert("A team with that name already exists.");
    return;
  }

  // If no avatar uploaded → use default decal
  if (!file) {
    teams.push({
      id: Date.now(),
      name: name,
      avatar: "images/default-avatar.png"
    });

    localStorage.setItem("teams", JSON.stringify(teams));
    renderTeams();
    return;
  }

  // If avatar uploaded → read it normally
  const reader = new FileReader();
  reader.onload = function(e) {
    teams.push({
      id: Date.now(),
      name: name,
      avatar: e.target.result
    });

    localStorage.setItem("teams", JSON.stringify(teams));
    renderTeams();
  };
  reader.readAsDataURL(file);
}

   function editTeam(id) {
  const team = teams.find(t => t.id === id);
  if (!team) return;

  const newName = prompt("Enter new team name:", team.name);
  if (!newName) return;

  // Prevent duplicate names
  const exists = teams.some(t => t.name.toLowerCase() === newName.toLowerCase() && t.id !== id);
  if (exists) {
    alert("A team with that name already exists.");
    return;
  }

  team.name = newName;

  // Optional: replace avatar
  const changeAvatar = confirm("Change avatar?");
  if (changeAvatar) {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.onchange = e => {
      const file = e.target.files[0];

      // ⭐ THIS IS STEP 4 — the correct spot
      if (!file) {
        team.avatar = "images/default-avatar.png";
        localStorage.setItem("teams", JSON.stringify(teams));
        renderTeams();
        return;
      }

      const reader = new FileReader();
      reader.onload = ev => {
        team.avatar = ev.target.result;
        localStorage.setItem("teams", JSON.stringify(teams));
        renderTeams();
      };
      reader.readAsDataURL(file);
    };
    input.click();
  } else {
    localStorage.setItem("teams", JSON.stringify(teams));
    renderTeams();
  }
}


function deleteTeam(id) {
  if (!confirm("Delete this team?")) return;
  teams = teams.filter(t => t.id !== id);
  localStorage.setItem("teams", JSON.stringify(teams));
  renderTeams();
}
   function exportTeams() {
  const data = JSON.stringify(teams, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "teams.json";
  a.click();

  URL.revokeObjectURL(url);
}

function importTeams() {
  const fileInput = document.getElementById("importFile");
  const file = fileInput.files[0];
  if (!file) {
    alert("Choose a JSON file first.");
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);

      // Validate structure
      if (!Array.isArray(imported)) throw "Invalid format";

      teams = imported;
      localStorage.setItem("teams", JSON.stringify(teams));
      renderTeams();
      alert("Teams imported successfully.");
    } catch (err) {
      alert("Invalid JSON file.");
    }
  };
  reader.readAsText(file);
}
 

    renderTeams();
  </script>
</body>
</html>
