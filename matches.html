<!DOCTYPE html>
<html>
<head>
  <title>Teams & Matches – Electric Storm Scoring</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #050816;
      color: #f5f5f5;
    }
    header {
      background: #0b1020;
      border-bottom: 2px solid #22d3ee;
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a {
      color: #e5e7eb;
      margin-left: 1rem;
      text-decoration: none;
    }
    nav a:hover {
      color: #22d3ee;
    }
    main {
      padding: 2rem;
      max-width: 900px;
      margin: auto;
    }
    .card {
      background: #0b1020;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border: 1px solid #1f2937;
    }
    input, button {
      padding: 0.5rem;
      margin-top: 0.5rem;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #22d3ee;
      color: #000;
      cursor: pointer;
      margin-top: 1rem;
    }
    button:hover {
      background: #1bb8d1;
    }
    .team-list {
      margin-top: 1rem;
    }
    .team-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .team-item img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">Electric Storm Scoring</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="scorekeeper.html">Scorekeeper</a>
      <a href="audience.html">Audience</a>
      <a href="rankings.html">Rankings</a>
      <a href="matches.html">Teams & Matches</a>
    </nav>
  </header>

  <main>
    <h1>Teams & Matches</h1>

    <div class="card">
      <h2>Add a Team</h2>
      <input id="teamName" placeholder="Team Name">
      <input id="teamAvatar" type="file" accept="image/*">
      <button onclick="addTeam()">Add Team</button>
    </div>

    <div class="card">
      <h2>Teams</h2>
      <div id="teamList" class="team-list"></div>
    </div>
  </main>

  <script>
    let teams = JSON.parse(localStorage.getItem("teams")) || [];

    function renderTeams() {
      const list = document.getElementById("teamList");
      list.innerHTML = "";

      teams.forEach(team => {
        const div = document.createElement("div");
        div.className = "team-item";
        div.innerHTML = `
          <img src="${team.avatar}">
          <strong>${team.name}</strong>
        `;
        list.appendChild(div);
      });
    }

    function addTeam() {
      const name = document.getElementById("teamName").value;
      const file = document.getElementById("teamAvatar").files[0];

      if (!name || !file) {
        alert("Please enter a name and choose an avatar.");
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        teams.push({
          id: Date.now(),
          name: name,
          avatar: e.target.result
        });

        localStorage.setItem("teams", JSON.stringify(teams));
        renderTeams();
      };
      reader.readAsDataURL(file);
    }

    renderTeams();
  </script>
</body>
</html>
