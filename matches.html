<!DOCTYPE html>
<html>
<head>
  <title>Teams & Matches – Electric Storm Scoring</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #050816;
      color: #f5f5f5;
    }
    header {
      background: #0b1020;
      border-bottom: 2px solid #EBF368;
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand {
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #EBF368;
    }
    nav a {
      color: #e5e7eb;
      margin-left: 1rem;
      text-decoration: none;
    }
    nav a:hover {
      color: #EBF368;
    }
    main {
      padding: 2rem;
      max-width: 900px;
      margin: auto;
    }
    .card {
      background: #0b1020;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border: 1px solid #1f2937;
    }
    input, button {
      padding: 0.5rem;
      margin-top: 0.5rem;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #EBF368;
      color: #000;
      cursor: pointer;
      margin-top: 1rem;
    }
    button:hover {
      background: #1bb8d1;
    }
    .team-list {
      margin-top: 1rem;
    }
    .team-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .team-item img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">Electric Storm Scoring</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="scorekeeper.html">Scorekeeper</a>
      <a href="audience.html">Audience</a>
      <a href="rankings.html">Rankings</a>
      <a href="matches.html">Teams & Matches</a>
    </nav>
  </header>

  <main>
    <h1>Teams & Matches</h1>

    <!-- ADD TEAM -->
    <div class="card">
      <h2>Add a Team</h2>
      <input id="teamName" placeholder="Team Name">
      <input id="teamAvatar" type="file" accept="image/*">
      <button onclick="addTeam()">Add Team</button>
    </div>

    <!-- TEAM LIST -->
    <div class="card">
      <h2>Teams</h2>
      <div id="teamList" class="team-list"></div>
    </div>

    <!-- MATCH SCHEDULER -->
    <div class="card">
      <h2>Match Schedule</h2>

      <label>Matches per team:</label>
      <input id="matchesPerTeam" type="number" min="1" value="3">

      <button onclick="generateSchedule()">Generate Match Schedule</button>

      <div id="matchList" class="team-list"></div>
    </div>

    <!-- EVENT DATA -->
    <div class="card">
      <h2>Event Data</h2>
      <button onclick="exportTeams()">Export Teams</button>
      <input type="file" id="importFile" accept=".json" style="margin-top:1rem;">
      <button onclick="importTeams()">Import Teams</button>
    </div>

  </main>

  <script>
    /* ============================
       TEAM STORAGE + PASSCODE
    ============================ */
    let teams = JSON.parse(localStorage.getItem("teams")) || [];
    let matches = JSON.parse(localStorage.getItem("matches")) || [];

    const PASSCODE = "13415";

    function requirePasscode() {
      const entered = prompt("Enter passcode to edit:");
      return entered === PASSCODE;
    }

    /* ============================
       TEAM RENDERING
    ============================ */
    function renderTeams() {
      const list = document.getElementById("teamList");
      list.innerHTML = "";

      teams.forEach(team => {
        const div = document.createElement("div");
        div.className = "team-item";

        const avatar = team.avatar && team.avatar !== ""
          ? team.avatar
          : "images/default-avatar.png";

        div.innerHTML = `
          <img src="${avatar}">
          <strong>${team.name}</strong>
          <button onclick="editTeam(${team.id})">Edit</button>
          <button onclick="deleteTeam(${team.id})">Delete</button>
        `;

        list.appendChild(div);
      });
    }

    /* ============================
       TEAM ADD / EDIT / DELETE
    ============================ */
    function addTeam() {
      const name = document.getElementById("teamName").value.trim();
      const file = document.getElementById("teamAvatar").files[0];

      if (!name) return alert("Please enter a team name.");

      if (teams.some(t => t.name.toLowerCase() === name.toLowerCase())) {
        return alert("A team with that name already exists.");
      }

      if (!file) {
        teams.push({
          id: Date.now(),
          name,
          avatar: "images/default-avatar.png"
        });
        localStorage.setItem("teams", JSON.stringify(teams));
        renderTeams();
        return;
      }

      const reader = new FileReader();
      reader.onload = e => {
        teams.push({
          id: Date.now(),
          name,
          avatar: e.target.result
        });
        localStorage.setItem("teams", JSON.stringify(teams));
        renderTeams();
      };
      reader.readAsDataURL(file);
    }

    function editTeam(id) {
      if (!requirePasscode()) return alert("Incorrect passcode.");

      const team = teams.find(t => t.id === id);
      if (!team) return;

      const newName = prompt("Enter new team name:", team.name);
      if (!newName) return;

      if (teams.some(t => t.name.toLowerCase() === newName.toLowerCase() && t.id !== id)) {
        return alert("A team with that name already exists.");
      }

      team.name = newName;

      if (confirm("Change avatar?")) {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = e => {
          const file = e.target.files[0];
          if (!file) {
            team.avatar = "images/default-avatar.png";
          } else {
            const reader = new FileReader();
            reader.onload = ev => team.avatar = ev.target.result;
            reader.readAsDataURL(file);
          }
          localStorage.setItem("teams", JSON.stringify(teams));
          renderTeams();
        };
        input.click();
      } else {
        localStorage.setItem("teams", JSON.stringify(teams));
        renderTeams();
      }
    }

    function deleteTeam(id) {
      if (!requirePasscode()) return alert("Incorrect passcode.");
      if (!confirm("Delete this team?")) return;

      teams = teams.filter(t => t.id !== id);
      localStorage.setItem("teams", JSON.stringify(teams));
      renderTeams();
    }

    /* ============================
       TEAM IMPORT / EXPORT
    ============================ */
    function exportTeams() {
      const data = JSON.stringify(teams, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "teams.json";
      a.click();

      URL.revokeObjectURL(url);
    }

    function importTeams() {
      const file = document.getElementById("importFile").files[0];
      if (!file) return alert("Choose a JSON file first.");

      const reader = new FileReader();
      reader.onload = e => {
        try {
          const imported = JSON.parse(e.target.result);
          if (!Array.isArray(imported)) throw "Invalid format";

          teams = imported;
          localStorage.setItem("teams", JSON.stringify(teams));
          renderTeams();
          alert("Teams imported successfully.");
        } catch {
          alert("Invalid JSON file.");
        }
      };
      reader.readAsText(file);
    }

    /* ============================
       FTC-STYLE AUTO SCHEDULER
    ============================ */
    function generateSchedule() {
      if (!requirePasscode()) return alert("Incorrect passcode.");

      const matchesPerTeam = parseInt(document.getElementById("matchesPerTeam").value);
      if (isNaN(matchesPerTeam) || matchesPerTeam < 1) {
        return alert("Enter a valid number of matches per team.");
      }

      if (teams.length < 4) {
        return alert("You need at least 4 teams to generate a 2v2 schedule.");
      }

      matches = [];
      let matchNumber = 1;

      const partners = {};
      const opponents = {};

      teams.forEach(t => {
        partners[t.id] = new Set();
        opponents[t.id] = new Set();
      });

      const totalMatches = Math.ceil((teams.length * matchesPerTeam) / 4);

      const shuffled = [...teams];

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }

      for (let m = 0; m < totalMatches; m++) {
        shuffle(shuffled);

        let group = null;

        for (let i = 0; i < shuffled.length - 3; i++) {
          const g = shuffled.slice(i, i + 4);
          const [a, b, c, d] = g.map(t => t.id);

          if (partners[a].has(b)) continue;
          if (partners[c].has(d)) continue;

          if (opponents[a].has(c) || opponents[a].has(d)) continue;
          if (opponents[b].has(c) || opponents[b].has(d)) continue;

          group = g;
          break;
        }

        if (!group) {
          group = shuffled.slice(0, 4);
        }

        const [t1, t2, t3, t4] = group.map(t => t.id);

        partners[t1].add(t2);
        partners[t2].add(t1);
        partners[t3].add(t4);
        partners[t4].add(t3);

        [t1, t2].forEach(r => {
          opponents[r].add(t3);
          opponents[r].add(t4);
        });
        [t3, t4].forEach(b => {
          opponents[b].add(t1);
          opponents[b].add(t2);
        });

        matches.push({
          matchNumber: matchNumber++,
          red1: t1,
          red2: t2,
          blue1: t3,
          blue2: t4,
          surrogate: false
        });
      }

      localStorage.setItem("matches", JSON.stringify(matches));
      renderMatches();
    }

    /* ============================
       MATCH RENDERING
    ============================ */
    function renderMatches() {
      const list = document.getElementById("matchList");
      list.innerHTML = "";

      matches.forEach(match => {
        const r1 = teams.find(t => t.id === match.red1)?.name || "TBD";
        const r2 = teams.find(t => t.id === match.red2)?.name || "TBD";
        const b1 = teams.find(t => t.id === match.blue1)?.name || "TBD";
        const b2 = teams.find(t => t.id === match.blue2)?.name || "TBD";

        const surrogateTag = match.surrogate
          ? `<span style="color:#EBF368; font-size:0.8rem;">(Surrogate Match)</span>`
          : "";

        const div = document.createElement("div");
        div.className = "team-item";
        div.innerHTML = `
          <strong>Match ${match.matchNumber}</strong> ${surrogateTag}<br>
          <span style="color:#ff4d4d">${r1} & ${r2}</span> vs 
          <span style="color:#4da6ff">${b1} & ${b2}</span>
          <button onclick="deleteMatch(${match.matchNumber})">Delete</button>
        `;

        list.appendChild(div);
      });
    }

    /* ============================
       DELETE MATCH
    ============================ */
    function deleteMatch(num) {
      if (!requirePasscode()) return alert("Incorrect passcode.");

      matches = matches.filter(m => m.matchNumber !== num);
      matches.forEach((m, i) => m.matchNumber = i + 1);

      localStorage.setItem("matches", JSON.stringify(matches));
      renderMatches();
    }

    /* ============================
       INITIAL LOAD
    ============================ */
    renderTeams();
    renderMatches();

  </script>
</body>
</html>
